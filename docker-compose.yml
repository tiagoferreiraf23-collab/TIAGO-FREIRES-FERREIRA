version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sdr_postgres
    environment:
      POSTGRES_DB: sdr_solar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sdr_redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: sdr_evolution
    ports:
      - '8080:8080'
    env_file:
      - evolution.env
    volumes:
      - ./evolution.env:/evolution/.env
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  # Alternative WhatsApp provider — WAHA (whatsapp-web.js / Puppeteer based).
  # Different engine from Evolution (Baileys) — bypasses fetchProps issue.
  # Free tier (Core) is sufficient for development and small production.
  waha:
    image: devlikeapro/waha:latest
    container_name: sdr_waha
    ports:
      - '3001:3000'  # WAHA inside container exposes 3000; we map to 3001 on host
    environment:
      WAHA_PRINT_QR: 'false'
      WHATSAPP_API_KEY: 'sdr_waha_secret_change_me'
      WHATSAPP_HOOK_URL: 'http://host.docker.internal:3000/webhooks/whatsapp'
      WHATSAPP_HOOK_EVENTS: 'message,session.status'
    volumes:
      - waha_sessions:/app/.sessions
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: sdr_api
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/sdr_solar
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: sdr_dashboard
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: sdr_prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: sdr_grafana
    ports:
      - '3002:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  waha_sessions:
  prometheus_data:
  grafana_data:
